name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify import
        run: python -c "import evm"

      - name: Verify --help
        run: python evm.py --help

      - name: Verify --version
        run: python evm.py --version

      - name: Run full pipeline on face.mp4
        run: python evm.py -i face.mp4 -o face_magnified.avi -fl 0.83 -fh 1.0 -a 50

      - name: Verify output exists
        run: test -f face_magnified.avi
